<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu - OnliFix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../css/style_webpage.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../img/logo.png">
</head>

<body>
    <a class="skip-link" href="#main-content">Bỏ qua điều hướng</a>

    <header role="banner">
        <div class="container nav-container">
            <a href="webpage.html" class="logo">
                <img src="../img/logo.png" alt="OnliFix" style="height: 40px;"> OnliFix
            </a>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-outline">Quay lại Đăng nhập</a>
            </div>
        </div>
    </header>

    <main id="main-content" class="auth-wrapper" role="main">
        <div class="auth-card">
            
            <!-- Step 1: Request Token -->
            <div id="step-1-request" class="auth-content active">
                <div class="auth-header">
                    <h2>Khôi phục mật khẩu</h2>
                    <p>Nhập số điện thoại đã đăng ký để nhận mã khôi phục.</p>
                </div>
                <form id="request-form">
                    <div class="input-group">
                        <label for="request-phone">Số điện thoại</label>
                        <div class="input-field">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" id="request-phone" placeholder="Nhập số điện thoại của bạn" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Gửi yêu cầu</button>
                </form>
            </div>

            <!-- Step 2: Reset Password -->
            <div id="step-2-reset" class="auth-content" style="display: none;">
                <div class="auth-header">
                    <h2>Tạo mật khẩu mới</h2>
                    <p>Một mã khôi phục đã được gửi. Vui lòng nhập mã và mật khẩu mới.</p>
                </div>
                <form id="reset-form">
                    <div class="input-group">
                        <label for="reset-token">Mã khôi phục</label>
                        <div class="input-field">
                            <i class="fa-solid fa-key"></i>
                            <input type="text" id="reset-token" placeholder="Dán mã khôi phục vào đây" required>
                        </div>
                        <div id="token-display" style="margin-top: 8px; font-size: 12px; color: #64748b; display: none;">
                            <strong>Mã của bạn (chỉ để demo):</strong> <pre id="token-value" style="background: #f1f5f9; padding: 8px; border-radius: 4px; margin-top: 4px; white-space: pre-wrap; word-break: break-all;"></pre>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reset-pass">Mật khẩu mới</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="reset-pass" placeholder="Nhập mật khẩu mới (ít nhất 6 ký tự)" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Xác nhận</button>
                </form>
            </div>

        </div>
    </main>

    <script src="../js/script_webpage.js"></script>
    <script src="../js/forgot-password.js"></script>
    <div id="toast" role="status" aria-live="polite" class="toast" aria-hidden="true"></div>
</body>

</html>
